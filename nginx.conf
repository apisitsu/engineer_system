server {
    listen 80;
    server_name localhost;

    # Serve React Frontend
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # ถ้าหาไฟล์ ($uri) หรือโฟลเดอร์ ($uri/) ไม่เจอ ให้วิ่งกลับไปหา /index.html
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:2005/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy Auth related endpoints
    location /auth/ {
        proxy_pass http://backend:2005/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy File Uploads handling
    location /uploads/ {
        proxy_pass http://backend:2005/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy WebSocket handling
    location /ws {
        proxy_pass http://backend:2005/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}