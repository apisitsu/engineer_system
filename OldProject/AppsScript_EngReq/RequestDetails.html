<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Details - ROD END Request System</title>
  <?!= include('Stylesheet'); ?>
  <style>
    .details-box {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .flow-timeline {
      position: relative;
      padding-left: 30px;
    }
    .flow-step {
      position: relative;
      padding: 15px;
      margin-bottom: 15px;
      background: #f5f5f5;
      border-radius: 8px;
      border-left: 4px solid #ddd;
    }
    .flow-step.completed {
      border-left-color: #4CAF50;
      background: #E8F5E9;
    }
    .flow-step.current {
      border-left-color: #2196F3;
      background: #E3F2FD;
    }
    .flow-step.pending {
      border-left-color: #9E9E9E;
      background: #FAFAFA;
    }
    .flow-step::before {
      content: '';
      position: absolute;
      left: -22px;
      top: 20px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ddd;
    }
    .flow-step.completed::before {
      background: #4CAF50;
    }
    .flow-step.current::before {
      background: #2196F3;
    }
    .flow-step-header {
      font-weight: bold;
      margin-bottom: 8px;
      color: #333;
    }
    .flow-step-content {
      font-size: 14px;
      color: #666;
    }
    .flow-step-date {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
    }
    /* Admin Edit Styles */
    .admin-badge {
      display: inline-block;
      background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
      color: white;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
      margin-left: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .admin-editable {
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
      padding: 2px 4px;
      border-radius: 4px;
    }
    .admin-editable:hover {
      background: #fff3cd;
      border: 1px dashed #ffc107;
    }
    .admin-editable::after {
      content: ' (dbl-click to edit)';
      font-size: 10px;
      color: #888;
      font-style: italic;
      display: none;
    }
    .admin-editable:hover::after {
      display: inline;
    }
    .admin-edit-input {
      padding: 4px 8px;
      border: 2px solid #4285F4;
      border-radius: 4px;
      font-size: 14px;
      width: 100%;
      max-width: 300px;
      box-sizing: border-box;
    }
    .admin-edit-hint {
      font-size: 10px;
      color: #888;
      margin-top: 4px;
    }
    .admin-editable.admin-file-edit-btn::after {
      display: none !important;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <main class="content-area" style="margin-left:0; max-width:100%;">
      <!-- Page Header -->
      <div class="form-card">
        <div class="page-header" style="display:flex; justify-content:space-between; align-items:center;">
          <h1>Request Details</h1>
          <button onclick="goBack()" class="btn btn-secondary">Back to Dashboard</button>
        </div>
      </div>

      <!-- Request Info -->
      <div class="form-card">
        <div class="form-card-header">Request Information</div>
        <div id="requestDetailsContent">
          <div class="loading">Loading...</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay" style="display:none;">
    <div class="spinner"></div>
    <p>Processing...</p>
  </div>

  <script>
    var BASE_URL = '<?= baseUrl ?>';
    var requestItem = '<?= requestItem ?>';
    var isUserAdmin = false;
    var isUserDraftman = false;
    var currentEditingRequestItem = '';

    function goBack() {
      window.top.location.href = BASE_URL + '?page=dashboard';
    }

    window.onload = function() {
      // Load all data in one call
      if (requestItem) {
        loadRequestDetails(requestItem);
      } else {
        document.getElementById('requestDetailsContent').innerHTML = '<p style="color:red;">No request item specified.</p>';
      }
    };

    function loadRequestDetails(reqItem) {
      document.getElementById('requestDetailsContent').innerHTML = '<div class="loading">Loading request: ' + reqItem + '...</div>';

      google.script.run
        .withSuccessHandler(function(data) {
          // Set user info from combined response
          if (data && data.userInfo) {
            isUserAdmin = data.userInfo.isAdmin;
          }
          if (data) {
            isUserDraftman = data.isDraftman || false;
          }
          renderRequestDetailsFlow(data, reqItem);
        })
        .withFailureHandler(function(err) {
          console.error('getRequestDetailsWithUserInfo error:', err);
          document.getElementById('requestDetailsContent').innerHTML = '<p style="color:red;">Error: ' + err.message + '</p>';
        })
        .getRequestDetailsWithUserInfo(reqItem);
    }

    function renderRequestDetailsFlow(data, requestItem) {
      if (!data) {
        document.getElementById('requestDetailsContent').innerHTML = '<p>No data found for request: <strong>' + requestItem + '</strong></p><p style="color:#888; font-size:12px;">Please check if the request exists in the Requests sheet.</p>';
        return;
      }

      // Store current request item for admin editing
      currentEditingRequestItem = data.requestItem;

      var adminBadge = isUserAdmin ? '<span class="admin-badge">Admin</span>' : '';

      var html = '<div class="details-box" style="margin-bottom:20px;">' +
        '<strong>Request Item:</strong> ' + data.requestItem + adminBadge + '<br>' +
        '<strong>Request No:</strong> ' + (data.requestNo || '-') + '<br>' +
        '<strong>Requester:</strong> ' + data.requester + '<br>' +
        '<strong>Type:</strong> ' + data.typeOfRequest + '<br>' +
        '<strong>Title:</strong> ' + data.title + '<br>' +
        '<strong>Status:</strong> <span class="status">' + data.status + '</span>' +
        '</div>';

      html += '<h3>Workflow Progress</h3>';
      html += '<div class="flow-timeline">';

      // Define flow steps
      var flowSteps = [
        { key: 'request', title: '1. Request Submitted', data: data.requestData },
        { key: 'engCheck', title: '2. Eng Check', data: data.engCheckData },
        { key: 'draftMan', title: '3. Draft Man', data: data.draftManData },
        { key: 'dwgCheck', title: '4. DWG Check', data: data.dwgCheckData },
        { key: 'engReview', title: '5. Eng Review', data: data.engReviewData },
        { key: 'engApprove', title: '6. Eng Approve', data: data.engApproveData },
        { key: 'engInform', title: '7. Eng Inform', data: data.engInformData }
      ];

      // Show all steps to all users
      var visibleSteps = flowSteps;

      var currentRequestItem = data.requestItem;

      visibleSteps.forEach(function(step, index) {
        var stepData = step.data;
        var stepClass = 'pending';
        var content = '<em>Pending...</em>';
        var dateStr = '';
        var clickable = false;
        var clickAction = '';

        if (stepData && stepData.completed) {
          stepClass = 'completed';
          content = formatFlowStepContent(step.key, stepData);
          if (stepData.timestamp) {
            var d = new Date(stepData.timestamp);
            dateStr = d.toLocaleDateString('en-GB', {day: '2-digit', month: '2-digit', year: 'numeric'}) + ' ' + d.toLocaleTimeString('en-GB', {hour: '2-digit', minute: '2-digit'});
          }

          // Allow Draftman to edit even after completed, but only if Eng Approve not yet started
          if (step.key === 'draftMan' && isUserDraftman) {
            var engApproveStarted = data.engApproveData && (data.engApproveData.completed || data.engApproveData.current);
            if (!engApproveStarted) {
              clickable = true;
              clickAction = 'openDraftManFormFromFlow(\'' + currentRequestItem + '\')';
              content += '<br><span style="color:#1a73e8; font-size:11px;">✏️ Double-click to edit</span>';
            }
          }
        } else if (stepData && stepData.current) {
          stepClass = 'current';
          content = '<em>In progress...</em>';
          if (step.key === 'draftMan' && isUserDraftman) {
            clickable = true;
            clickAction = 'openDraftManFormFromFlow(\'' + currentRequestItem + '\')';
            content += '<br><span style="color:#1a73e8; font-size:11px;">✏️ Double-click to open form</span>';
          }
        }

        var clickAttr = clickable ? ' ondblclick="' + clickAction + '" style="cursor:pointer;"' : '';
        html += '<div class="flow-step ' + stepClass + '"' + clickAttr + '>' +
          '<div class="flow-step-header">' + step.title + '</div>' +
          '<div class="flow-step-content">' + content + '</div>' +
          (dateStr ? '<div class="flow-step-date">' + dateStr + '</div>' : '') +
          '</div>';
      });

      html += '</div>';

      if (!data.canViewAllFlows) {
        html += '<p style="color:#888; font-size:12px; margin-top:20px;"><em>Note: Some workflow details are restricted based on your permission level.</em></p>';
      }

      document.getElementById('requestDetailsContent').innerHTML = html;
    }

    function formatFlowStepContent(key, data) {
      function adminEditable(stepKey, field, value, label) {
        if (isUserAdmin) {
          return '<span class="admin-editable" ondblclick="enableAdminEdit(this, \'' + stepKey + '\', \'' + field + '\', \'' + escapeQuotes(value || '') + '\')">' + (value || '-') + '</span>';
        }
        return (value || '-');
      }

      switch(key) {
        case 'request':
          return '<strong>Detail:</strong> ' + adminEditable('request', 'detail', data.detail) +
            formatFileLinks(data.attachFiles, 'Attachments', 'request', 'attachFiles');
        case 'engCheck':
          return '<strong>Checked by:</strong> ' + (data.checker || '-') +
            '<br><strong>Status:</strong> ' + adminEditable('engCheck', 'status', data.status) +
            '<br><strong>Comment:</strong> ' + adminEditable('engCheck', 'comment', data.comment);
        case 'draftMan':
          return '<strong>Drafted by:</strong> ' + (data.draftman || '-') +
            formatFileLinks(data.dwgFiles, 'Drawing Files', 'draftMan', 'dwgFiles');
        case 'dwgCheck':
          return '<strong>Checked by:</strong> ' + (data.checker || '-') +
            '<br><strong>Status:</strong> ' + adminEditable('dwgCheck', 'status', data.status) +
            '<br><strong>Comment:</strong> ' + adminEditable('dwgCheck', 'comment', data.comment);
        case 'engReview':
          return '<strong>Reviewed by:</strong> ' + (data.reviewer || '-') +
            '<br><strong>Drawing No:</strong> ' + adminEditable('engReview', 'drawingNo', data.drawingNo) +
            '<br><strong>No. of DWG:</strong> ' + adminEditable('engReview', 'noOfDwg', data.noOfDwg) +
            '<br><strong>Section:</strong> ' + adminEditable('engReview', 'section', data.section) +
            formatFileLinks(data.attachFiles, 'Attached Files', 'engReview', 'attachFiles');
        case 'engApprove':
          return '<strong>Approved by:</strong> ' + (data.approver || '-') +
            '<br><strong>Judgement:</strong> ' + adminEditable('engApprove', 'judgement', data.judgement) +
            '<br><strong>Comment:</strong> ' + adminEditable('engApprove', 'comment', data.comment);
        case 'engInform':
          return '<strong>Informed:</strong> ' + (data.informed ? 'Yes' : 'No') +
            '<br><strong>Cost:</strong> ' + adminEditable('engInform', 'cost', data.cost) +
            '<br><strong>Evidence:</strong> ' + adminEditable('engInform', 'evidence', data.evidence || '');
        default:
          return '-';
      }
    }

    function formatFileLinks(filesStr, label, stepKey, field) {
      var html = '<br><strong>' + label + ':</strong>';
      if (isUserAdmin && stepKey && field) {
        html += ' <span class="admin-editable admin-file-edit-btn" style="font-size:11px; cursor:pointer; color:#1565c0; font-weight:600;" onclick="enableAdminEditFiles(this, \'' + stepKey + '\', \'' + field + '\', \'' + escapeQuotes(filesStr || '') + '\')">[Edit]</span>';
      }
      html += '<br>';
      if (!filesStr || !filesStr.trim()) {
        html += '<em>No files</em>';
        return html;
      }
      var files = filesStr.split('\n').filter(function(f) { return f.trim(); });
      if (files.length === 0) {
        html += '<em>No files</em>';
        return html;
      }
      files.forEach(function(file, i) {
        var fileStr = file.trim();
        var fileName, url;
        if (fileStr.indexOf('|') !== -1) {
          var parts = fileStr.split('|');
          fileName = parts[0];
          url = parts[1];
        } else {
          url = fileStr;
          fileName = extractFileNameFromUrl(url, i);
        }
        html += '<a href="' + url + '" target="_blank" style="color:#1a73e8; text-decoration:none;">📎 ' + fileName + '</a><br>';
      });
      return html;
    }

    function extractFileNameFromUrl(url, index) {
      try {
        var urlObj = new URL(url);
        var pathname = urlObj.pathname;
        if (url.indexOf('drive.google.com') !== -1) {
          return 'Attached File ' + (index + 1);
        }
        var parts = pathname.split('/');
        var lastPart = parts[parts.length - 1];
        if (lastPart && lastPart.length > 0 && lastPart.indexOf('.') !== -1) {
          return decodeURIComponent(lastPart);
        }
      } catch (e) {
        console.log('Error extracting filename:', e);
      }
      return 'Attached File ' + (index + 1);
    }

    function parseFileDisplay(fileStr, index) {
      fileStr = fileStr.trim();
      var fileName, url;
      if (fileStr.indexOf('|') !== -1) {
        var parts = fileStr.split('|');
        fileName = parts[0];
        url = parts[1];
      } else {
        url = fileStr;
        fileName = 'File ' + (index + 1);
      }
      return { fileName: fileName, url: url };
    }

    function escapeQuotes(str) {
      return String(str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, '\\n').replace(/\r/g, '');
    }

    function escapeHtml(str) {
      return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // Admin inline editing
    function enableAdminEdit(element, stepKey, field, currentValue) {
      if (!isUserAdmin) {
        alert('Admin access required');
        return;
      }
      var input = document.createElement('input');
      input.type = 'text';
      input.className = 'admin-edit-input';
      input.value = currentValue;
      var originalContent = element.innerHTML;
      element.innerHTML = '';
      element.appendChild(input);
      var hint = document.createElement('div');
      hint.className = 'admin-edit-hint';
      hint.textContent = 'Press Enter to save, Esc to cancel';
      element.appendChild(hint);
      input.focus();
      input.select();
      input.onkeydown = function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          saveAdminEdit(currentEditingRequestItem, stepKey, field, input.value, element, originalContent);
        } else if (e.key === 'Escape') {
          e.preventDefault();
          element.innerHTML = originalContent;
        }
      };
      input.onblur = function() {
        setTimeout(function() {
          if (element.querySelector('input')) {
            element.innerHTML = originalContent;
          }
        }, 200);
      };
    }

    function saveAdminEdit(reqItem, stepKey, field, newValue, element, originalContent) {
      showLoading();
      var updateData = {};
      updateData[field] = newValue;
      var successHandler = function(result) {
        hideLoading();
        handleAdminEditResult(result, element, newValue, originalContent, reqItem);
      };
      var failureHandler = function(err) {
        hideLoading();
        alert('Error: ' + err.message);
        element.innerHTML = originalContent;
      };
      switch(stepKey) {
        case 'request':
          google.script.run.withSuccessHandler(successHandler).withFailureHandler(failureHandler).adminUpdateRequestData(reqItem, field, newValue);
          break;
        case 'engCheck':
          google.script.run.withSuccessHandler(successHandler).withFailureHandler(failureHandler).adminUpdateEngCheckData(reqItem, updateData);
          break;
        case 'draftMan':
          google.script.run.withSuccessHandler(successHandler).withFailureHandler(failureHandler).adminUpdateDraftManData(reqItem, updateData);
          break;
        case 'dwgCheck':
          google.script.run.withSuccessHandler(successHandler).withFailureHandler(failureHandler).adminUpdateDWGCheckData(reqItem, updateData);
          break;
        case 'engReview':
          google.script.run.withSuccessHandler(successHandler).withFailureHandler(failureHandler).adminUpdateEngReviewData(reqItem, updateData);
          break;
        case 'engApprove':
          google.script.run.withSuccessHandler(successHandler).withFailureHandler(failureHandler).adminUpdateEngApproveData(reqItem, updateData);
          break;
        case 'engInform':
          google.script.run.withSuccessHandler(successHandler).withFailureHandler(failureHandler).adminUpdateEngInformData(reqItem, updateData);
          break;
        default:
          hideLoading();
          alert('Unknown step: ' + stepKey);
          element.innerHTML = originalContent;
          return;
      }
    }

    function handleAdminEditResult(result, element, newValue, originalContent, reqItem) {
      if (result.success) {
        element.innerHTML = newValue || '-';
        element.className = 'admin-editable';
        element.ondblclick = function() {
          enableAdminEdit(this, element.getAttribute('data-step'), element.getAttribute('data-field'), newValue);
        };
        element.style.background = '#d4edda';
        setTimeout(function() {
          element.style.background = '';
        }, 1500);
        console.log('Admin edit saved: ' + result.message);
      } else {
        alert('Failed to save: ' + result.message);
        element.innerHTML = originalContent;
      }
    }

    // Admin file edit functions
    function enableAdminEditFiles(element, stepKey, field, currentValue) {
      if (!isUserAdmin) {
        alert('Admin access required');
        return;
      }
      var unescaped = currentValue.replace(/\\n/g, '\n').replace(/\\'/g, "'").replace(/&quot;/g, '"');
      var fileLines = unescaped.split('\n').filter(function(f) { return f.trim(); });
      var fileListHtml = '';
      fileLines.forEach(function(line, idx) {
        var parsed = parseFileDisplay(line, idx);
        fileListHtml += buildAdminFileRowHtml(idx, line.trim(), parsed.fileName, parsed.url);
      });
      if (fileLines.length === 0) {
        fileListHtml = '<div id="adminFileEmptyMsg" style="color:#888; padding:10px; text-align:center;">No attachments</div>';
      }
      var modalHtml =
        '<div id="adminFileEditModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; display:flex; justify-content:center; align-items:center;">' +
          '<div style="background:white; padding:24px; border-radius:12px; width:90%; max-width:650px; max-height:85vh; overflow-y:auto;">' +
            '<h3 style="margin-top:0; margin-bottom:16px;">Edit Attachments</h3>' +
            '<div style="margin-bottom:16px;">' +
              '<div style="font-weight:600; margin-bottom:8px;">Current Files:</div>' +
              '<div id="adminFileList" style="border:1px solid #e0e0e0; border-radius:8px; padding:8px; min-height:40px;">' +
                fileListHtml +
              '</div>' +
            '</div>' +
            '<div style="margin-bottom:16px;">' +
              '<label style="display:inline-flex; align-items:center; gap:6px; padding:8px 16px; background:#e8f5e9; color:#2e7d32; border:1px solid #a5d6a7; border-radius:6px; cursor:pointer; font-size:13px;">' +
                '+ Add New Files' +
                '<input type="file" multiple style="display:none;" onchange="adminAddNewFiles(this)">' +
              '</label>' +
              '<div id="adminUploadProgress" style="display:none; margin-top:8px; font-size:12px; color:#1565c0;"><span id="adminUploadSpinner" style="display:inline-block; animation:spin 1s linear infinite; margin-right:4px;">⏳</span> <span id="adminUploadText">Uploading...</span></div>' +
            '</div>' +
            '<details style="margin-bottom:16px;">' +
              '<summary style="cursor:pointer; font-size:12px; color:#666; margin-bottom:8px;">Edit Raw Data (Advanced)</summary>' +
              '<textarea id="adminFileEditTextarea" style="width:100%; height:150px; padding:10px; font-family:monospace; font-size:12px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box; resize:none;"></textarea>' +
              '<div style="font-size:11px; color:#888; margin-top:4px;">Format: filename|url (one file per line)</div>' +
            '</details>' +
            '<div style="text-align:right; border-top:1px solid #eee; padding-top:16px;">' +
              '<button onclick="cancelAdminFileEdit()" style="padding:10px 20px; margin-right:10px; background:#f5f5f5; border:1px solid #ccc; border-radius:6px; cursor:pointer;">Cancel</button>' +
              '<button onclick="saveAdminFileEdit(\'' + stepKey + '\', \'' + field + '\')" style="padding:10px 20px; background:#4285F4; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:600;">Save</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      document.body.insertAdjacentHTML('beforeend', modalHtml);
      var textarea = document.getElementById('adminFileEditTextarea');
      textarea.value = unescaped;
    }

    function buildAdminFileRowHtml(idx, line, fileName, url) {
      return '<div class="admin-file-item" id="adminFileItem_' + idx + '" data-line="' + escapeHtml(line) + '" style="padding:6px 8px; border-bottom:1px solid #f0f0f0;">' +
        '<div style="display:flex; align-items:center; gap:8px;">' +
          '<span>📎</span>' +
          '<a href="' + escapeHtml(url) + '" target="_blank" style="color:#1a73e8; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px;">' + escapeHtml(fileName) + '</a>' +
          '<label style="padding:4px 10px; background:#e3f2fd; color:#1565c0; border:1px solid #90caf9; border-radius:4px; cursor:pointer; font-size:11px; white-space:nowrap;">' +
            'Replace' +
            '<input type="file" style="display:none;" onchange="adminReplaceFileInRow(this, ' + idx + ')">' +
          '</label>' +
          '<button onclick="adminDeleteFileRow(' + idx + ')" style="padding:4px 8px; background:#ffebee; color:#c62828; border:1px solid #ef9a9a; border-radius:4px; cursor:pointer; font-size:11px;">Delete</button>' +
        '</div>' +
      '</div>';
    }

    function syncAdminFileTextarea() {
      var items = document.querySelectorAll('#adminFileList .admin-file-item');
      var lines = [];
      items.forEach(function(item) {
        lines.push(item.getAttribute('data-line'));
      });
      var textarea = document.getElementById('adminFileEditTextarea');
      if (textarea) {
        textarea.value = lines.join('\n');
      }
    }

    function adminReplaceFileInRow(input, idx) {
      if (!input.files || !input.files[0]) return;
      var file = input.files[0];
      var progressDiv = document.getElementById('adminUploadProgress');
      var progressText = document.getElementById('adminUploadText');
      progressDiv.style.display = 'block';
      progressText.textContent = 'Uploading ' + file.name + '...';
      var reader = new FileReader();
      reader.onload = function(e) {
        var base64 = e.target.result.split(',')[1];
        google.script.run
          .withSuccessHandler(function(result) {
            progressDiv.style.display = 'none';
            if (result.success) {
              var newLine = result.fileName + '|' + result.url;
              var item = document.getElementById('adminFileItem_' + idx);
              if (item) {
                item.setAttribute('data-line', newLine);
                var link = item.querySelector('a');
                if (link) {
                  link.href = result.url;
                  link.textContent = result.fileName;
                }
              }
              syncAdminFileTextarea();
            } else {
              alert('Upload failed: ' + result.message);
            }
          })
          .withFailureHandler(function(err) {
            progressDiv.style.display = 'none';
            alert('Error: ' + err.message);
          })
          .uploadFile({ name: file.name, mimeType: file.type || 'application/octet-stream', data: base64 }, currentEditingRequestItem);
      };
      reader.onerror = function() {
        progressDiv.style.display = 'none';
        alert('Failed to read file');
      };
      reader.readAsDataURL(file);
    }

    function adminDeleteFileRow(idx) {
      var item = document.getElementById('adminFileItem_' + idx);
      if (item) {
        item.remove();
        syncAdminFileTextarea();
        var list = document.getElementById('adminFileList');
        if (!list.querySelector('.admin-file-item')) {
          list.innerHTML = '<div id="adminFileEmptyMsg" style="color:#888; padding:10px; text-align:center;">No attachments</div>';
        }
      }
    }

    function adminAddNewFiles(input) {
      if (!input.files || input.files.length === 0) return;
      var files = Array.from(input.files);
      var progressDiv = document.getElementById('adminUploadProgress');
      var progressText = document.getElementById('adminUploadText');
      progressDiv.style.display = 'block';
      var uploadCount = 0;
      var totalFiles = files.length;
      files.forEach(function(file) {
        progressText.textContent = 'Uploading ' + file.name + ' (' + (uploadCount + 1) + '/' + totalFiles + ')...';
        var reader = new FileReader();
        reader.onload = function(e) {
          var base64 = e.target.result.split(',')[1];
          google.script.run
            .withSuccessHandler(function(result) {
              uploadCount++;
              if (result.success) {
                var newLine = result.fileName + '|' + result.url;
                addFileToAdminList(newLine, result.fileName, result.url);
                syncAdminFileTextarea();
              } else {
                alert('Upload failed: ' + file.name + ' - ' + result.message);
              }
              if (uploadCount >= totalFiles) {
                progressDiv.style.display = 'none';
              } else {
                progressText.textContent = 'Uploading (' + (uploadCount + 1) + '/' + totalFiles + ')...';
              }
            })
            .withFailureHandler(function(err) {
              uploadCount++;
              alert('Error uploading ' + file.name + ': ' + err.message);
              if (uploadCount >= totalFiles) {
                progressDiv.style.display = 'none';
              }
            })
            .uploadFile({ name: file.name, mimeType: file.type || 'application/octet-stream', data: base64 }, currentEditingRequestItem);
        };
        reader.onerror = function() {
          uploadCount++;
          alert('Failed to read file: ' + file.name);
          if (uploadCount >= totalFiles) {
            progressDiv.style.display = 'none';
          }
        };
        reader.readAsDataURL(file);
      });
      input.value = '';
    }

    function addFileToAdminList(line, fileName, url) {
      var list = document.getElementById('adminFileList');
      var emptyMsg = document.getElementById('adminFileEmptyMsg');
      if (emptyMsg) emptyMsg.remove();
      var items = list.querySelectorAll('.admin-file-item');
      var nextIdx = items.length > 0 ? (parseInt(items[items.length - 1].id.split('_')[1]) + 1) : 0;
      list.insertAdjacentHTML('beforeend', buildAdminFileRowHtml(nextIdx, line, fileName, url));
    }

    function cancelAdminFileEdit() {
      var modal = document.getElementById('adminFileEditModal');
      if (modal) modal.remove();
    }

    function saveAdminFileEdit(stepKey, field) {
      var textarea = document.getElementById('adminFileEditTextarea');
      var newValue = textarea.value.trim();
      cancelAdminFileEdit();
      showLoading();
      var updateData = {};
      updateData[field] = newValue;
      var successHandler = function(result) {
        hideLoading();
        if (result.success) {
          alert('Files updated successfully');
          loadRequestDetails(currentEditingRequestItem);
        } else {
          alert('Failed to save: ' + result.message);
        }
      };
      var failureHandler = function(err) {
        hideLoading();
        alert('Error: ' + err.message);
      };
      switch(stepKey) {
        case 'request':
          google.script.run.withSuccessHandler(successHandler).withFailureHandler(failureHandler).adminUpdateRequestData(currentEditingRequestItem, field, newValue);
          break;
        case 'draftMan':
          google.script.run.withSuccessHandler(successHandler).withFailureHandler(failureHandler).adminUpdateDraftManData(currentEditingRequestItem, updateData);
          break;
        case 'engReview':
          google.script.run.withSuccessHandler(successHandler).withFailureHandler(failureHandler).adminUpdateEngReviewData(currentEditingRequestItem, updateData);
          break;
        default:
          hideLoading();
          alert('Unknown step: ' + stepKey);
      }
    }

    // Open DraftManForm from flow page (for Draftman users only)
    function openDraftManFormFromFlow(reqItem) {
      if (!isUserDraftman) {
        alert('You do not have permission to access Draft Man form.');
        return;
      }
      // Navigate to Dashboard with draft-man modal open
      window.top.location.href = BASE_URL + '?page=dashboard&openModal=draft-man&requestNo=' + encodeURIComponent(reqItem);
    }

    function showLoading() {
      document.getElementById('loadingOverlay').style.display = 'flex';
    }

    function hideLoading() {
      document.getElementById('loadingOverlay').style.display = 'none';
    }
  </script>
</body>
</html>
