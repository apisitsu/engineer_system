<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Setup Data</title>
    <?!= include('add-data-css'); ?>
</head>
<body>
    
    <div class="container">
        <div class="header">
            <a href="#" id="backLink" class="back-link" target="_top">← Back to Search</a>
            <h1>Edit Setup Data</h1>
        </div>
        
        <div class="main-content">
            <div class="selection-box">
                <div class="form-group">
                    <label>Sheet Name:</label>
                    <input type="text" class="form-select" id="info-sheet" disabled>
                </div>
                <div class="form-group">
                    <label>CN / Process Code:</label>
                    <input type="text" class="form-select" id="info-cn" disabled>
                </div>
            </div>

            <div id="dynamic-form-container" class="dynamic-form">
                </div>

            <!-- Revision Section -->
            <div id="revision-section" class="revision-section" style="display: none;">
                <hr style="margin: 20px 0; border: 1px solid #ddd;">

                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="saveAsRevision" style="width: auto;">
                        <span style="font-weight: bold;">Save as New Revision</span>
                    </label>
                    <p id="revision-preview" style="margin: 10px 0 0 28px; color: #555; font-size: 0.9em; display: none;"></p>
                </div>

                <!-- ECN Form (collapsible) -->
                <div id="ecn-form" style="display: none; margin-top: 15px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; background-color: #f9f9f9;">
                    <h3 style="margin-top: 0;">Engineering Change Notice (ECN)</h3>

                    <div class="form-group-dynamic">
                        <label for="ecn-no">ECN NO. <span style="color: red;">*</span></label>
                        <input type="text" id="ecn-no" class="form-input" placeholder="e.g., ECN-2025-001" required>
                    </div>

                    <div class="form-group-dynamic">
                        <label for="ecn-date">ECN Date <span style="color: red;">*</span></label>
                        <input type="date" id="ecn-date" class="form-input" required>
                    </div>

                    <div class="form-group-dynamic">
                        <label for="ecn-description">Description <span style="color: red;">*</span></label>
                        <textarea id="ecn-description" class="form-input" rows="3" placeholder="Describe the changes made in this revision" required></textarea>
                    </div>

                    <div class="form-group-dynamic">
                        <label for="ecn-remark">Remark (Optional)</label>
                        <textarea id="ecn-remark" class="form-input" rows="2" placeholder="Additional remarks or notes"></textarea>
                    </div>
                </div>
            </div>

            <div id="loader" class="loader" style="display: none;">Loading...</div>

            <div class="save-container">
                <button id="save-button" class="save-btn" style="display: none;">Update Data</button>
            </div>
            <div id="status-message" class="status-message" style="display: none;"></div>
        </div>
    </div>

<script>
    // --- CLIENT-SIDE SCRIPT for edit-data.html (FIXED Version) ---
    const editParams = <?!= JSON.stringify({ sheet: sheet || '', cn: cn || '', pcode: pcode || '', rev: rev || '', machine: machine || '', url: url || '' }) ?>;
    const editSheet = editParams.sheet;
    const editCn = editParams.cn;
    const editPcode = editParams.pcode;
    const editRev = editParams.rev;
    const editMachine = editParams.machine;
    const dashboardUrl = editParams.url;

    let currentHeaders = [];
    let currentData = {};
    let hasRevColumn = false;
    let nextRevision = '';

    const formContainer = document.getElementById('dynamic-form-container');
    const saveButton = document.getElementById('save-button');
    const loader = document.getElementById('loader');
    const statusMessage = document.getElementById('status-message');
    const revisionSection = document.getElementById('revision-section');
    const saveAsRevisionCheckbox = document.getElementById('saveAsRevision');
    const revisionPreview = document.getElementById('revision-preview');
    const ecnForm = document.getElementById('ecn-form');

    // Set back link URL
    document.getElementById('backLink').href = dashboardUrl;
    
    function getTemplateHeadersAsync(sheetName, cn, pcode, machine, rev) {
        return new Promise((resolve, reject) => {
            google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(reject)
                .getTemplateHeadersForEdit(sheetName, cn, pcode, machine, rev);
        });
    }

    function getExistingDataAsync(sheetName, cn, pcode, rev) {
        return new Promise((resolve, reject) => {
            google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(reject)
                .getExistingData(sheetName, cn, pcode, rev);
        });
    }

    function getNextRevisionAsync(sheetName, cn, pcode) {
        return new Promise((resolve, reject) => {
            google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(reject)
                .getNextRevision(sheetName, cn, pcode);
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (!editSheet || !editCn) {
            showError('Missing Sheet Name or CN from URL.');
            return;
        }

        document.getElementById('info-sheet').value = editSheet;
        document.getElementById('info-cn').value = `${editCn} / ${editPcode || 'N/A'}`;
        
        loader.style.display = 'block';
        loader.textContent = 'Loading form and data...';

        // Get machine from data first (need for headers)
        const machineFromData = null; // Will be determined from existing data

        Promise.all([
            getExistingDataAsync(editSheet, editCn, editPcode, editRev),
            getNextRevisionAsync(editSheet, editCn, editPcode)
        ])
        .then(([dataResponse, nextRev]) => {
            if (!dataResponse || !dataResponse.success) {
                showError(`Failed to load data: ${dataResponse ? dataResponse.error : 'Unknown error'}`);
                return Promise.reject('Data load failed');
            }

            const machine = dataResponse.data.Machine || null;

            // Now get headers with actual tooling count
            return Promise.all([
                getTemplateHeadersAsync(editSheet, editCn, editPcode, machine, editRev),
                Promise.resolve(dataResponse),
                Promise.resolve(nextRev)
            ]);
        })
        .then(([headersResponse, dataResponse, nextRev]) => {
            loader.style.display = 'none';

            if (!headersResponse || !headersResponse.success) {
                showError(`Failed to load headers: ${headersResponse ? headersResponse.error : 'Unknown error'}`);
                return;
            }
            if (!dataResponse || !dataResponse.success) {
                showError(`Failed to load data: ${dataResponse ? dataResponse.error : 'Function getExistingData not found in Code.gs'}`);
                return;
            }

            currentHeaders = headersResponse.headers;
            currentData = dataResponse.data;
            nextRevision = nextRev || 'A';

            // Check if Setup_Data_Sheet_REV column exists
            hasRevColumn = currentHeaders.includes('Setup_Data_Sheet_REV');

            buildAndPopulateForm(currentHeaders, currentData);
            saveButton.style.display = 'block';

            // Show revision section if REV column exists
            if (hasRevColumn) {
                revisionSection.style.display = 'block';
                const currentRev = currentData.Setup_Data_Sheet_REV || 'NC';
                revisionPreview.textContent = `Current REV: ${currentRev} → Next REV will be: ${nextRevision}`;
            }

        })
        .catch(err => {
            loader.style.display = 'none';
            showError(err.message || String(err));
        });
    });

    function buildAndPopulateForm(headers, data) {
        let html = '';
        headers.forEach(header => {
            let isDisabled = false;
            if (header === 'CN' || header === 'Process_Code') {
                isDisabled = true;
            }
            const value = data[header] !== undefined ? data[header] : '';

            html += `
                <div class="form-group-dynamic">
                    <label for="field-${header}">${header}:</label>
                    <input type="text" id="field-${header}" name="${header}" class="form-input" value="${escapeHTML(value)}" ${isDisabled ? 'disabled' : ''}>
                </div>
            `;
        });
        formContainer.innerHTML = html;

        // Initialize autocomplete for form inputs
        if (editSheet) {
            initializeAutocompleteForForm(editSheet);
        }
    }

    // Checkbox handler: Show/hide ECN form
    saveAsRevisionCheckbox.addEventListener('change', (e) => {
        if (e.target.checked) {
            ecnForm.style.display = 'block';
            revisionPreview.style.display = 'block';
            saveButton.textContent = `Save as New Revision (${nextRevision})`;
        } else {
            ecnForm.style.display = 'none';
            revisionPreview.style.display = 'none';
            saveButton.textContent = 'Update Data';
            // Clear ECN fields
            document.getElementById('ecn-no').value = '';
            document.getElementById('ecn-date').value = '';
            document.getElementById('ecn-description').value = '';
            document.getElementById('ecn-remark').value = '';
        }
    });

    saveButton.addEventListener('click', () => {
        const isSaveAsRevision = saveAsRevisionCheckbox.checked;

        // Validate ECN fields if saving as new revision
        if (isSaveAsRevision) {
            const ecnNo = document.getElementById('ecn-no').value.trim();
            const ecnDate = document.getElementById('ecn-date').value.trim();
            const ecnDesc = document.getElementById('ecn-description').value.trim();

            if (!ecnNo || !ecnDate || !ecnDesc) {
                showMessage(false, 'ECN Number, Date, and Description are required for new revisions.');
                return;
            }
        }

        loader.style.display = 'block';
        loader.textContent = isSaveAsRevision ? 'Creating new revision...' : 'Updating data...';
        saveButton.disabled = true;
        showMessage(false);

        const formData = {
            sheetName: editSheet,
            CN: editCn,
            Process_Code: editPcode,
            Machine: editMachine || currentData.Machine || '',
            saveAsNewRevision: isSaveAsRevision
        };

        // Add ECN fields if saving as revision
        if (isSaveAsRevision) {
            formData.ecnNo = document.getElementById('ecn-no').value.trim();
            formData.ecnDate = document.getElementById('ecn-date').value.trim();
            formData.ecnDescription = document.getElementById('ecn-description').value.trim();
            formData.ecnRemark = document.getElementById('ecn-remark').value.trim();
        }

        const inputs = formContainer.querySelectorAll('.form-input');
        inputs.forEach(input => {
            if (!input.disabled) {
                formData[input.name] = input.value;
            }
        });

        google.script.run
            .withSuccessHandler(response => {
                loader.style.display = 'none';
                saveButton.disabled = false;
                if (response.success) {
                    showMessage(true, response.message);
                    // If new revision created, optionally reload or redirect
                    if (isSaveAsRevision && response.newRevision) {
                        setTimeout(() => {
                            window.top.location.href = dashboardUrl;
                        }, 2000);
                    }
                } else {
                    showMessage(false, response.error);
                }
            })
            .withFailureHandler(err => {
                loader.style.display = 'none';
                saveButton.disabled = false;
                showError(err.message);
            })
            .updateData(formData);
    });

    // ================================================================ //
    //                    AUTOCOMPLETE SYSTEM                          //
    // ================================================================ //

    /**
     * Autocomplete class for input fields
     * Fetches suggestions from backend and displays dropdown
     */
    class Autocomplete {
        constructor(inputElement, sheetName, fieldName) {
            this.input = inputElement;
            this.sheetName = sheetName;
            this.fieldName = fieldName;
            this.dropdown = null;
            this.selectedIndex = -1;
            this.suggestions = [];
            this.debounceTimer = null;

            this.init();
        }

        init() {
            // Wrap input in container
            const wrapper = document.createElement('div');
            wrapper.className = 'autocomplete-container';
            this.input.parentNode.insertBefore(wrapper, this.input);
            wrapper.appendChild(this.input);

            // Create dropdown
            this.dropdown = document.createElement('div');
            this.dropdown.className = 'autocomplete-dropdown';
            wrapper.appendChild(this.dropdown);

            // Attach event listeners
            this.input.addEventListener('input', (e) => this.onInput(e));
            this.input.addEventListener('keydown', (e) => this.onKeydown(e));
            this.input.addEventListener('blur', () => setTimeout(() => this.hide(), 200));
            this.input.addEventListener('focus', (e) => {
                if (e.target.value.length > 0) {
                    this.onInput(e);
                }
            });
        }

        onInput(e) {
            const searchTerm = e.target.value.trim();

            // Clear previous timer
            if (this.debounceTimer) {
                clearTimeout(this.debounceTimer);
            }

            // Hide if empty
            if (searchTerm.length === 0) {
                this.hide();
                return;
            }

            // Show loading
            this.showLoading();

            // Debounce search (300ms)
            this.debounceTimer = setTimeout(() => {
                this.fetchSuggestions(searchTerm);
            }, 300);
        }

        fetchSuggestions(searchTerm) {
            google.script.run
                .withSuccessHandler((response) => {
                    this.input.classList.remove('autocomplete-input-loading');
                    if (response.success) {
                        this.suggestions = response.suggestions;
                        this.displaySuggestions();
                    } else {
                        this.showError(response.error);
                    }
                })
                .withFailureHandler((err) => {
                    this.input.classList.remove('autocomplete-input-loading');
                    console.error('Autocomplete error:', err);
                    this.hide();
                })
                .getFieldSuggestions(this.sheetName, this.fieldName, searchTerm, 10);
        }

        showLoading() {
            this.input.classList.add('autocomplete-input-loading');
            this.dropdown.innerHTML = '<div class="autocomplete-loading">Loading...</div>';
            this.dropdown.classList.add('active');
        }

        displaySuggestions() {
            if (this.suggestions.length === 0) {
                this.dropdown.innerHTML = '<div class="autocomplete-no-results">No suggestions found</div>';
                this.dropdown.classList.add('active');
                this.selectedIndex = -1;
                return;
            }

            let html = '';
            this.suggestions.forEach((suggestion, index) => {
                html += `<div class="autocomplete-item" data-index="${index}">${this.escapeHTML(suggestion)}</div>`;
            });

            this.dropdown.innerHTML = html;
            this.dropdown.classList.add('active');
            this.selectedIndex = -1;

            // Attach click handlers
            this.dropdown.querySelectorAll('.autocomplete-item').forEach(item => {
                item.addEventListener('click', () => {
                    const index = parseInt(item.getAttribute('data-index'));
                    this.selectSuggestion(index);
                });
            });
        }

        showError(message) {
            this.dropdown.innerHTML = `<div class="autocomplete-no-results">Error: ${this.escapeHTML(message)}</div>`;
            this.dropdown.classList.add('active');
        }

        onKeydown(e) {
            if (!this.dropdown.classList.contains('active')) return;

            const items = this.dropdown.querySelectorAll('.autocomplete-item');
            if (items.length === 0) return;

            switch (e.key) {
                case 'ArrowDown':
                    e.preventDefault();
                    this.selectedIndex = Math.min(this.selectedIndex + 1, items.length - 1);
                    this.highlightItem(items);
                    break;

                case 'ArrowUp':
                    e.preventDefault();
                    this.selectedIndex = Math.max(this.selectedIndex - 1, 0);
                    this.highlightItem(items);
                    break;

                case 'Enter':
                    e.preventDefault();
                    if (this.selectedIndex >= 0) {
                        this.selectSuggestion(this.selectedIndex);
                    }
                    break;

                case 'Escape':
                    this.hide();
                    break;
            }
        }

        highlightItem(items) {
            items.forEach((item, index) => {
                if (index === this.selectedIndex) {
                    item.classList.add('selected');
                    item.scrollIntoView({ block: 'nearest' });
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        selectSuggestion(index) {
            if (index >= 0 && index < this.suggestions.length) {
                this.input.value = this.suggestions[index];
                this.hide();
                this.input.focus();

                // Trigger change event
                this.input.dispatchEvent(new Event('change', { bubbles: true }));
            }
        }

        hide() {
            this.dropdown.classList.remove('active');
            this.selectedIndex = -1;
        }

        escapeHTML(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
    }

    /**
     * Initialize autocomplete for all form inputs
     */
    function initializeAutocompleteForForm(sheetName) {
        const formInputs = formContainer.querySelectorAll('.form-input:not([disabled])');
        formInputs.forEach(input => {
            const fieldName = input.name;
            if (fieldName) {
                new Autocomplete(input, sheetName, fieldName);
            }
        });
    }

    function showError(message) {
        loader.style.display = 'none';
        showMessage(false, `Error: ${message}`);
    }
    
    function showMessage(isSuccess, message) {
        statusMessage.textContent = message;
        statusMessage.className = isSuccess ? 'status-message success' : 'status-message error';
        statusMessage.style.display = 'block';
    }
    
    function escapeHTML(str) {
      return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
</script>
</body>
</html>
