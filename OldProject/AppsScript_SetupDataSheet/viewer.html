<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Data Sheet</title>
    <?!= include('main-styles-css'); ?>
</head>
<body>
    <div class="navigation">
        <a href="<?= url ?>" class="nav-button">← Dashboard</a>
        <button id="revisionHistoryBtn" class="nav-button" style="display: none; background-color: #2196F3;">📜 Revision History</button>
    </div>
    <div id="loader" style="text-align:center; padding: 40px; font-size: 1.2em;">Loading Template and Data...</div>
    <div id="errorMessage" class="error-message" style="display:none;"></div>

    <div id="content-container"></div>

    <!-- Revision History Modal -->
    <div id="revisionModal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5);">
        <div style="background-color: white; margin: 5% auto; padding: 20px; width: 80%; max-width: 800px; border-radius: 8px; max-height: 80vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">Revision History</h2>
                <button id="closeModal" style="background: none; border: none; font-size: 28px; cursor: pointer;">&times;</button>
            </div>
            <div id="revisionContent">Loading...</div>
        </div>
    </div>

    <script>
      const params = {
          sheetName: '<?= sheetName ?>',
          cn: '<?= cn ?>',
          process_code: '<?= process_code ?>'
      };

      window.addEventListener('load', () => {
          if (!params.sheetName || !params.cn) {
              showError("Data is incomplete (Sheet Name or CN is missing from URL).");
              return;
          }
          google.script.run
              .withSuccessHandler(response => {
                  document.getElementById('loader').style.display = 'none';
                  if (response.success) {
                      const container = document.getElementById('content-container');
                      container.innerHTML = response.html;

                      fitContentToScreen(container, response.totalWidth);

                      // Show revision history button if RevisionHistory sheet exists
                      checkRevisionHistoryAvailable();
                  } else {
                      showError(response.error);
                  }
              })
              .withFailureHandler(err => showError(err.message))
              .renderSheetAsHtml(params);
      });

      function checkRevisionHistoryAvailable() {
          // Try to load revision history to check if feature is available
          google.script.run
              .withSuccessHandler(response => {
                  if (response.success && response.revisions) {
                      // Show button only if there are revisions
                      if (response.revisions.length > 0) {
                          document.getElementById('revisionHistoryBtn').style.display = 'inline-block';
                      }
                  }
              })
              .withFailureHandler(err => {
                  // Silently fail - feature not available
                  console.log('Revision history not available');
              })
              .getRevisionHistory(params.cn, params.process_code);
      }

      // Revision History Modal handlers
      document.getElementById('revisionHistoryBtn').addEventListener('click', () => {
          const modal = document.getElementById('revisionModal');
          const content = document.getElementById('revisionContent');
          modal.style.display = 'block';
          content.innerHTML = 'Loading revision history...';

          google.script.run
              .withSuccessHandler(response => {
                  if (response.success) {
                      displayRevisionHistory(response.revisions);
                  } else {
                      content.innerHTML = `<p style="color: red;">Error: ${response.error}</p>`;
                  }
              })
              .withFailureHandler(err => {
                  content.innerHTML = `<p style="color: red;">Failed to load revision history: ${err.message}</p>`;
              })
              .getRevisionHistory(params.cn, params.process_code);
      });

      document.getElementById('closeModal').addEventListener('click', () => {
          document.getElementById('revisionModal').style.display = 'none';
      });

      // Close modal when clicking outside
      window.addEventListener('click', (e) => {
          const modal = document.getElementById('revisionModal');
          if (e.target === modal) {
              modal.style.display = 'none';
          }
      });

      function displayRevisionHistory(revisions) {
          const content = document.getElementById('revisionContent');

          if (!revisions || revisions.length === 0) {
              content.innerHTML = '<p>No revision history found for this document.</p>';
              return;
          }

          let html = '<table style="width: 100%; border-collapse: collapse;">';
          html += '<thead><tr style="background-color: #f5f5f5;">';
          html += '<th style="padding: 10px; border: 1px solid #ddd; text-align: left;">REV</th>';
          html += '<th style="padding: 10px; border: 1px solid #ddd; text-align: left;">ECN NO.</th>';
          html += '<th style="padding: 10px; border: 1px solid #ddd; text-align: left;">Description</th>';
          html += '<th style="padding: 10px; border: 1px solid #ddd; text-align: left;">Date</th>';
          html += '<th style="padding: 10px; border: 1px solid #ddd; text-align: left;">Created By</th>';
          html += '</tr></thead><tbody>';

          revisions.forEach(rev => {
              html += '<tr>';
              html += `<td style="padding: 8px; border: 1px solid #ddd;"><strong>${rev.rev}</strong></td>`;
              html += `<td style="padding: 8px; border: 1px solid #ddd;">${rev.ecnNo}</td>`;
              html += `<td style="padding: 8px; border: 1px solid #ddd;">${rev.description}</td>`;
              html += `<td style="padding: 8px; border: 1px solid #ddd;">${rev.timestamp}</td>`;
              html += `<td style="padding: 8px; border: 1px solid #ddd;">${rev.createdBy}</td>`;
              html += '</tr>';
          });

          html += '</tbody></table>';
          content.innerHTML = html;
      }

      function fitContentToScreen(container, contentWidth) {
        const screenWidth = container.offsetWidth;
        if (contentWidth > screenWidth) {
          const scale = (screenWidth / contentWidth) * 0.98;
          const contentDiv = container.firstChild; // The div wrapping the table
          if (contentDiv) {
            contentDiv.style.setProperty('--scale-factor', scale);
          }
        }
      }

      function showError(msg) {
          document.getElementById('loader').style.display = 'none';
          const errDiv = document.getElementById('errorMessage');
          errDiv.textContent = 'Error: ' + msg;
          errDiv.style.display = 'block';
      }
    </script>
</body>
</html>
