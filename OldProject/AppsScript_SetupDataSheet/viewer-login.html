<!-- ================================================================= -->
<!--              VIEWER SECONDARY AUTHENTICATION MODAL               -->
<!-- ================================================================= -->

<style>
/* Viewer Login Modal Styles */
.viewer-login-modal {
    display: none;
    position: fixed;
    z-index: 10000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(5px);
}

.viewer-login-modal.hidden {
    display: none !important;
    visibility: hidden !important;
    opacity: 0 !important;
    pointer-events: none !important;
}

.viewer-login-dialog {
    position: relative;
    background-color: #fff;
    margin: 10% auto;
    padding: 0;
    border-radius: 12px;
    width: 90%;
    max-width: 450px;
    box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
    animation: slideDown 0.3s ease-out;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-50px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.viewer-login-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 25px;
    border-radius: 12px 12px 0 0;
    text-align: center;
}

.viewer-login-header h3 {
    margin: 0;
    font-size: 24px;
    font-weight: 600;
}

.viewer-login-header p {
    margin: 10px 0 0 0;
    font-size: 14px;
    opacity: 0.9;
}

.viewer-login-body {
    padding: 30px;
}

.viewer-form-group {
    margin-bottom: 20px;
}

.viewer-form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: #333;
    font-size: 14px;
}

.viewer-form-group input {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 15px;
    transition: all 0.3s ease;
    box-sizing: border-box;
}

.viewer-form-group input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.viewer-error-message {
    background-color: #fee;
    border: 1px solid #fcc;
    color: #c33;
    padding: 12px 15px;
    border-radius: 8px;
    margin-bottom: 20px;
    display: none;
    font-size: 14px;
}

.viewer-error-message.show {
    display: block;
    animation: shake 0.5s;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
    20%, 40%, 60%, 80% { transform: translateX(5px); }
}

.viewer-login-footer {
    padding: 20px 30px;
    background-color: #f8f9fa;
    border-radius: 0 0 12px 12px;
    text-align: right;
}

.viewer-login-btn {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 12px 30px;
    font-size: 15px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.viewer-login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
}

.viewer-login-btn:active {
    transform: translateY(0);
}

.viewer-login-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

.viewer-info-box {
    background-color: #e3f2fd;
    border-left: 4px solid #2196f3;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 25px;
}

.viewer-info-box p {
    margin: 0;
    color: #1976d2;
    font-size: 13px;
    line-height: 1.6;
}

.viewer-session-info {
    background-color: #f1f8e9;
    border: 1px solid #c5e1a5;
    border-radius: 8px;
    padding: 12px 15px;
    margin-top: 10px;
    display: none;
}

.viewer-session-info.show {
    display: block;
}

.viewer-session-info p {
    margin: 5px 0;
    font-size: 13px;
    color: #558b2f;
}

.viewer-session-info strong {
    color: #33691e;
}
</style>

<div id="viewerLoginModal" class="viewer-login-modal">
    <div class="viewer-login-dialog">
        <div class="viewer-login-header">
            <h3>🔐 Viewer Access Login</h3>
            <p>Secondary authentication required</p>
        </div>
        <div class="viewer-login-body">
            <div class="viewer-info-box">
                <p><strong>ℹ️ Information:</strong> You are logged in as <strong>Viewer</strong>. Please enter your viewer credentials to access your allowed processes.</p>
                <p style="margin-top: 8px; font-size: 12px;"><strong>⏱️ Session Duration:</strong> Your session will expire after <strong>10 minutes</strong> of inactivity.</p>
            </div>

            <div id="viewerErrorMessage" class="viewer-error-message"></div>

            <div class="viewer-form-group">
                <label for="viewerUsername">👤 Username</label>
                <input
                    type="text"
                    id="viewerUsername"
                    placeholder="Enter your username"
                    autocomplete="username"
                >
            </div>

            <div class="viewer-form-group">
                <label for="viewerPassword">🔑 Password</label>
                <input
                    type="password"
                    id="viewerPassword"
                    placeholder="Enter your password"
                    autocomplete="current-password"
                >
            </div>
        </div>
        <div class="viewer-login-footer">
            <button id="viewerLoginBtn" class="viewer-login-btn" onclick="submitViewerLogin()">
                Login
            </button>
        </div>
    </div>
</div>

<script>
// ===== VIEWER AUTHENTICATION =====

/**
 * Global variable to store viewer session
 */
window.viewerSession = null;

/**
 * Check if Viewer role needs secondary authentication
 * Call this on page load
 */
function checkViewerAuthentication() {
    // Check if user is Viewer
    if (!userInfo.roles || !userInfo.roles.includes('Viewer')) {
        return; // Not a Viewer, skip
    }

    console.log('[Viewer Auth] Viewer role detected, checking session...');

    // Check if session exists and is valid
    const sessionStr = sessionStorage.getItem('viewer_session');

    if (sessionStr) {
        try {
            const session = JSON.parse(sessionStr);

            // Check if session expired
            const expiresAt = new Date(session.expires_at);
            const now = new Date();

            if (expiresAt > now) {
                // Session still valid
                window.viewerSession = session;
                console.log('[Viewer Auth] Valid session found:', session.username);
                showViewerSessionInfo(session);
                return;
            } else {
                console.log('[Viewer Auth] Session expired, clearing...');
                sessionStorage.removeItem('viewer_session');
            }
        } catch (e) {
            console.error('[Viewer Auth] Failed to parse session:', e);
            sessionStorage.removeItem('viewer_session');
        }
    }

    // No valid session - show login modal
    console.log('[Viewer Auth] No valid session, showing login modal');
    showViewerLoginModal();
}

/**
 * Show Viewer login modal
 */
function showViewerLoginModal() {
    console.log('[showViewerLoginModal] Attempting to show modal...');
    const modal = document.getElementById('viewerLoginModal');

    if (!modal) {
        console.error('[showViewerLoginModal] Modal element not found!');
        return;
    }

    // Remove hidden class and reset styles
    modal.classList.remove('hidden');
    modal.style.display = 'block';
    modal.style.visibility = 'visible';
    modal.style.opacity = '1';
    console.log('[showViewerLoginModal] Modal displayed');

    // Focus on username field
    setTimeout(() => {
        document.getElementById('viewerUsername').focus();
    }, 300);

    // Handle Enter key
    const inputs = modal.querySelectorAll('input');
    inputs.forEach(input => {
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitViewerLogin();
            }
        });
    });

    // Disable search until logged in
    const searchBtn = document.getElementById('searchBtn');
    if (searchBtn) {
        searchBtn.disabled = true;
        searchBtn.title = 'Please login first';
        console.log('[showViewerLoginModal] Search button disabled');
    }
}

/**
 * Hide Viewer login modal
 */
function hideViewerLoginModal() {
    console.log('[hideViewerLoginModal] Attempting to hide modal...');
    const modal = document.getElementById('viewerLoginModal');

    if (!modal) {
        console.error('[hideViewerLoginModal] Modal element not found!');
        return;
    }

    // Multiple methods to ensure modal is hidden
    modal.style.display = 'none';
    modal.style.visibility = 'hidden';
    modal.style.opacity = '0';
    modal.classList.add('hidden');
    console.log('[hideViewerLoginModal] Modal hidden with multiple methods');

    // Enable search
    const searchBtn = document.getElementById('searchBtn');
    if (searchBtn) {
        searchBtn.disabled = false;
        searchBtn.title = '';
        console.log('[hideViewerLoginModal] Search button enabled');
    }
}

/**
 * Submit Viewer login
 */
function submitViewerLogin() {
    const username = document.getElementById('viewerUsername').value.trim();
    const password = document.getElementById('viewerPassword').value;
    const errorDiv = document.getElementById('viewerErrorMessage');
    const loginBtn = document.getElementById('viewerLoginBtn');

    // Clear previous error
    errorDiv.classList.remove('show');
    errorDiv.textContent = '';

    // Validate input
    if (!username) {
        showViewerError('Please enter username');
        return;
    }

    if (!password) {
        showViewerError('Please enter password');
        return;
    }

    // Disable button and show loading
    loginBtn.disabled = true;
    loginBtn.textContent = 'Authenticating...';

    console.log('[Viewer Auth] Attempting login for:', username);

    // Call backend authentication
    google.script.run
        .withSuccessHandler(onViewerLoginSuccess)
        .withFailureHandler(onViewerLoginFailure)
        .authenticateViewer(username, password);
}

/**
 * Handle successful authentication
 */
function onViewerLoginSuccess(result) {
    console.log('[Viewer Auth] onViewerLoginSuccess called');
    console.log('[Viewer Auth] Result:', result);

    const loginBtn = document.getElementById('viewerLoginBtn');
    loginBtn.disabled = false;
    loginBtn.textContent = 'Login';

    if (result.success) {
        console.log('[Viewer Auth] Login successful:', result.session.username);

        // Store session
        window.viewerSession = result.session;
        sessionStorage.setItem('viewer_session', JSON.stringify(result.session));
        console.log('[Viewer Auth] Session stored');

        // Clear form
        document.getElementById('viewerUsername').value = '';
        document.getElementById('viewerPassword').value = '';
        console.log('[Viewer Auth] Form cleared');

        // Hide modal FIRST (to prevent UI blocking)
        console.log('[Viewer Auth] Calling hideViewerLoginModal()...');
        hideViewerLoginModal();

        // Show session info
        console.log('[Viewer Auth] Showing session info...');
        showViewerSessionInfo(result.session);

        // Show success message (using alert for now)
        setTimeout(() => {
            alert(`✅ Welcome, ${result.session.description || result.session.username}!`);
            console.log('[Viewer Auth] Welcome message shown');
        }, 300);

    } else {
        console.error('[Viewer Auth] Login failed:', result.error);
        // Show error
        showViewerError(result.error || 'Authentication failed');
    }
}

/**
 * Handle authentication failure
 */
function onViewerLoginFailure(error) {
    const loginBtn = document.getElementById('viewerLoginBtn');
    loginBtn.disabled = false;
    loginBtn.textContent = 'Login';

    console.error('[Viewer Auth] Login failed:', error);
    showViewerError('Connection error. Please try again.');
}

/**
 * Show error message in modal
 */
function showViewerError(message) {
    const errorDiv = document.getElementById('viewerErrorMessage');
    errorDiv.textContent = message;
    errorDiv.classList.add('show');
}

/**
 * Show viewer session info in header
 */
function showViewerSessionInfo(session) {
    // Add session info to header or somewhere visible
    const header = document.querySelector('.header');
    if (header) {
        let sessionDiv = document.getElementById('viewerSessionInfo');

        if (!sessionDiv) {
            sessionDiv = document.createElement('div');
            sessionDiv.id = 'viewerSessionInfo';
            sessionDiv.className = 'viewer-session-info show';
            header.appendChild(sessionDiv);
        }

        const codes = session.allowed_process_codes === '*'
            ? 'All Processes'
            : session.allowed_process_codes;

        sessionDiv.innerHTML = `
            <p><strong>👤 Viewer:</strong> ${session.description || session.username}</p>
            <p><strong>🔓 Access:</strong> ${codes}</p>
        `;
    }
}

/**
 * Logout viewer (clear session)
 */
function logoutViewer() {
    sessionStorage.removeItem('viewer_session');
    window.viewerSession = null;

    // Remove session info from UI
    const sessionDiv = document.getElementById('viewerSessionInfo');
    if (sessionDiv) {
        sessionDiv.remove();
    }

    // Show login modal again
    showViewerLoginModal();
}

// Auto-check on page load
document.addEventListener('DOMContentLoaded', checkViewerAuthentication);
</script>
