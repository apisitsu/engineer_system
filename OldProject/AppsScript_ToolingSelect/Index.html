<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tooling Selection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    :root {
      --primary-blue: #0d6efd;
      --primary-green: #198754;
      --primary-orange: #fd7e14;
      --primary-purple: #6f42c1;
      --bg-light: #f8f9fa;
    }

    body {
      background-color: var(--bg-light);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #333;
      padding-bottom: 50px;
    }

    /* --- Header Section --- */
    .header-card {
      background: linear-gradient(135deg, #0061f2 0%, #00c6d7 100%);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 10px 25px rgba(0, 97, 242, 0.2);
      margin-bottom: 2rem;
      text-align: center;
    }

    .search-box { max-width: 600px; margin: 0 auto; }
    .form-control-lg { border-radius: 50px; padding-left: 1.5rem; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .btn-search { border-radius: 50px; padding-left: 2rem; padding-right: 2rem; font-weight: 600; text-transform: uppercase; }

    .val-label { font-size: 0.75rem; color: #6c757d; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
    .val-data { font-size: 1.35rem; font-weight: 600; color: #212529; }
    
    /* --- Accordions & Tables --- */
    .accordion-button:not(.collapsed) { background-color: #f1f4f9; color: #0d6efd; box-shadow: inset 0 -1px 0 rgba(0,0,0,.125); }
    .accordion-button { font-weight: 600; }
    .machine-icon { color: #1a56db; font-size: 1.2rem; }
    
    .table thead { background-color: #f8f9fa; color: #495057; font-size: 0.85rem; text-transform: uppercase; border-bottom: 2px solid #dee2e6; }
    .table th, .table td { padding: 12px 15px; vertical-align: middle; text-align: center; }
    .table td.col-no { text-align: left; font-weight: 600; }
    
    .rank-badge { display: inline-block; width: 22px; height: 22px; line-height: 22px; text-align: center; border-radius: 50%; font-size: 0.7rem; font-weight: 700; color: white; }
    .rank-1 { background-color: #ffc107; }
    .rank-2 { background-color: #adb5bd; }
    .rank-3 { background-color: #cd7f32; }

    /* Target Badge in Header */
    .req-badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 3px 8px;
      margin-top: 5px;
      border-radius: 4px;
      background-color: #e0f2fe;
      color: #0369a1;
      border: 1px solid #bae6fd;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    /* --- Loading --- */
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.85); z-index: 9999;
      display: none; align-items: center; justify-content: center; flex-direction: column;
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loader">
  <div class="spinner-border text-primary" role="status"></div>
  <div class="mt-3 text-primary fw-bold">Processing Specification...</div>
</div>

<div class="container-fluid px-4 py-3">

  <div class="header-card">
    <h1 class="fw-bold mb-2">Tooling Selection System</h1>
    <div class="search-box">
      <div class="input-group">
        <input type="text" id="cnInput" class="form-control form-control-lg" placeholder="Enter C/N" autofocus>
        <button class="btn btn-dark btn-search" type="button" id="btnSearch" onclick="performSearch()">
          <i class="bi bi-search me-2"></i>Calculate
        </button>
      </div>
    </div>
  </div>

  <div id="resultArea" style="display:none;">

    <div class="row mb-4">
      <div class="col-12">
        <div class="card border-0 shadow-sm" style="border-left: 5px solid #343a40;">
          <div class="card-body p-4">
            <h5 class="fw-bold mb-4" style="color:#343a40;"><i class="bi bi-box-fill me-2"></i>Part Dimensions</h5>
            
            <div class="row g-4 mb-4 pb-4 border-bottom">
              <div class="col-md-4 col-sm-12">
                <div class="val-label mb-2">OD (Outside Diameter)</div>
                <div class="d-flex align-items-center">
                  <span class="badge bg-secondary me-2">Bf</span><span class="val-data fs-5" id="partOdBf">-</span>
                  <i class="bi bi-arrow-right mx-3 text-muted"></i>
                  <span class="badge bg-primary me-2">Aft</span><span class="val-data fs-5 text-primary" id="partOdAft">-</span>
                </div>
              </div>
              
              <div class="col-md-4 col-sm-12">
                <div class="val-label mb-2">ID (Inside Diameter)</div>
                <div class="d-flex align-items-center">
                  <span class="badge bg-secondary me-2">Bf</span><span class="val-data fs-5" id="partIdBf">-</span>
                  <i class="bi bi-arrow-right mx-3 text-muted"></i>
                  <span class="badge bg-primary me-2">Aft</span><span class="val-data fs-5 text-primary" id="partIdAft">-</span>
                </div>
              </div>
              
              <div class="col-md-4 col-sm-12">
                <div class="val-label mb-2">W (Thickness)</div>
                <div class="d-flex align-items-center">
                  <span class="badge bg-secondary me-2">Bf</span><span class="val-data fs-5" id="partWBf">-</span>
                  <i class="bi bi-arrow-right mx-3 text-muted"></i>
                  <span class="badge bg-primary me-2">Aft</span><span class="val-data fs-5 text-primary" id="partWAft">-</span>
                </div>
              </div>
            </div>

            <div class="row g-3">
              <div class="col-md-3 col-sm-6"><div class="val-label">Type</div><div class="val-data text-secondary fs-6" id="partType">-</div></div>
              <div class="col-md-3 col-sm-6"><div class="val-label">Process</div><div class="val-data text-secondary fs-6" id="partProcess">-</div></div>
              <div class="col-md-3 col-sm-6"><div class="val-label">Yball</div><div class="val-data text-secondary fs-6" id="partYball">-</div></div>
              
              <div class="col-md-3 col-sm-6" id="sdContainer" style="display:none;">
                <div class="val-label text-info">Shoulder Dia (SD)</div>
                <div class="val-data text-info fs-6 fw-bold" id="partSD">-</div>
              </div>
            </div>
            
          </div>
        </div>
      </div>
    </div>

    <div id="machineAccordionContainer"></div>

  </div>
</div>

<script>
  function esc(val) {
    if (val === null || val === undefined) return '';
    const div = document.createElement('div');
    div.textContent = String(val);
    return div.innerHTML;
  }

  function setLoading(loading) {
    document.getElementById('loader').style.display = loading ? 'flex' : 'none';
    document.getElementById('btnSearch').disabled = loading;
    document.getElementById('cnInput').disabled = loading;
  }

  function performSearch() {
    const cnInput = document.getElementById('cnInput');
    const cn = cnInput.value.trim();

    if(!cn) { alert("Please enter a C/N number."); return; }

    setLoading(true);
    document.getElementById('resultArea').style.display = 'none';

    google.script.run
      .withSuccessHandler(displayResults)
      .withFailureHandler(handleError)
      .findFixtures(cn);
  }

  function renderMachineAccordions(res) {
    const container = document.getElementById('machineAccordionContainer');
    container.innerHTML = '';

    const mData = {};
    
    // 1. เพิ่ม KS400B6 ลงไปใน REQUIRED_COUNTS (มี 9 Toolings)
    const REQUIRED_COUNTS = {
      'KS-B22G': 2,
      'KS-B80': 2,
      'TSG-300ZNC': 2,
      'TSG300W': 1,
      'KS400B1': 5,
      'KS-03A': 9,
      'KS-B22RD': 9,
      'KS500RD': 3,
      'KS400B5': 10,
      'KS400B6': 9 
    };

    const addData = (items, toolName, cols, headers, targets, icon, order) => {
      if(!items || items.length === 0) return;
      items.forEach(item => {
        const m = item.machine;
        if(!mData[m]) mData[m] = {};
        if(!mData[m][toolName]) mData[m][toolName] = { 
          rows: [], cols: cols, headers: headers, targets: targets, icon: icon, order: order 
        };
        mData[m][toolName].rows.push(item);
      });
    };

    const c = res.calc;
    
    addData(res.jaws, 'JAW', ['val1', 'val2', 'val3', 'valD', 'valE'], ['ØID (A)', 'ØID (B)', 'Min Width (C)', 'Max Depth (D)', 'E'], [c.A, c.B, c.C, c.D_Limit, ''], 'bi-gear-fill text-primary', 1);
    addData(res.bps, 'BACK PLATE', ['val1', 'val2'], ['ØID (A)', 'Min ØPCD (B)'], [c.AA, c.BB], 'bi-disc-fill text-success', 2);
    addData(res.chutes, 'CHUTE', ['valA', 'valB', 'valC', 'valD'], ['Slot Length (A)', 'Slot Height (B)', 'Min Width (C)', 'Center Slot (D)'], [c.chuteA, c.chuteB, c.chuteC, c.chuteD], 'bi-box-seam-fill text-warning', 1);
    addData(res.carriersZNC, 'CARRIER (ZNC)', ['valA', 'valB', 'valC', 'valD'], ['Slot Width (A)', 'ØPCD (B)', 'Slot Length (C)', 'Carrier Thin (D)'], [c.carrierA, c.carrierB, c.carrierC, ''], 'bi-nut-fill text-purple', 2);
    addData(res.carriersW, 'CARRIER (W)', ['valA', 'valB'], ['Slot Width (A)', 'Carrier Thin (E)'], [c.carrierA, ''], 'bi-nut-fill text-purple', 3);
    
    if (res.ks400b && !res.ks400b.calc.error) {
      const ks = res.ks400b.calc;
      addData(res.ks400b.workDrivers, `WORK DRIVER`, ['val1', 'val2', 'val3', 'val4', 'val5', 'val6'], ['A (OD)', 'B (ID)', 'C (OD)', 'D (OD)', 'E (Width)', 'F (Step)'], [ks.wd_A, ks.wd_B, ks.wd_C, ks.wd_D, ks.wd_E, ks.wd_F], 'bi-wrench-adjustable text-info', 1);
      addData(res.ks400b.loadingChutes, 'LOADING CHUTE', ['val1', 'val2', 'val3', 'val4', 'val5', 'val6'], ['A', 'B', 'C', 'D', 'E', 'F'], [ks.lc_A, ks.lc_B, ks.lc_C, ks.lc_D, ks.lc_E, ks.lc_F], 'bi-box-seam text-warning', 2);
      addData(res.ks400b.supportBlocks, 'SUPPORT BLOCK', ['val1', 'val2', 'val3', 'val4', 'val5'], ['A', 'B', 'C', 'D', 'E'], [ks.sb_A, ks.sb_B, ks.sb_C, ks.sb_D, ks.sb_E], 'bi-box-fill text-success', 3);
      addData(res.ks400b.plugsA, `PLUG A`, ['val1', 'val2', 'val3', 'val4', 'val5'], ['A (OD)', 'B (OD)', 'C (Depth)', 'D (Cham)', 'E (Dist)'], [ks.pa_A, ks.pa_B, ks.pa_C, ks.pa_D, ks.pa_E], 'bi-plug text-danger', 4);
      addData(res.ks400b.plugsB, `PLUG B`, ['val1', 'val2', 'val3', 'val4', 'val5'], ['A (OD)', 'B (OD)', 'C (Depth)', 'D (Cham)', 'E (Dist)'], [ks.pb_A, ks.pb_B, ks.pb_C, ks.pb_D, ks.pb_E], 'bi-plug text-purple', 5);
    }

    if (res.ks03a && res.ks03a.calc && !res.ks03a.calc.error) {
      const ks3 = res.ks03a.calc;
      addData(res.ks03a.frontPlates, 'FRONT PLATE', ['val1', 'val2', 'val3', 'val4', 'val5'], ['A', 'B', 'C', '-', 'Type'], [ks3.fp.A, ks3.fp.B, ks3.fp.C, '', ks3.fp.Type], 'bi-shield-shaded text-success', 1);
      addData(res.ks03a.chuteCovers, 'CHUTE COVER', ['val1', 'val2', 'val3', 'val4', 'val5'], ['A', 'B', 'C', '-', 'Type'], [ks3.chute.A, ks3.chute.B, ks3.chute.C, '', ks3.chute.Type], 'bi-box-seam text-warning', 2);
      addData(res.ks03a.pressureRotors, 'PRESSURE ROTOR', ['val1', 'val2', 'val3', 'val4', 'val5'], ['A', 'B', 'C', '-', 'Type'], [ks3.pr.A, '', '', '', ks3.pr.Type], 'bi-arrow-repeat text-dark', 3);
      addData(res.ks03a.plugGauges, 'PLUG GAUGE', ['val1', 'val2', 'val3', 'val4', 'val5'], ['A (ID)', 'B', 'C', '-', 'Type'], [ks3.pg.A, ks3.pg.B, ks3.pg.C, '', ks3.pg.Type], 'bi-plug-fill text-purple', 4);
      addData(res.ks03a.settingGauges, 'SETTING GAUGE', ['val1', 'val2', 'val3', 'val4', 'val5'], ['A', 'B', 'C', 'M', 'Type'], [ks3.sg.A, ks3.sg.B, ks3.sg.C, ks3.sg.M, ks3.sg.Type], 'bi-speedometer2 text-danger', 5);
      addData(res.ks03a.masterRings, 'MASTER RING GAUGE', ['val1', 'val2', 'val3', 'val4', 'val5'], ['A (OD)', 'B (F"A")', 'C (W)', '-', 'Type'], [ks3.mr.A, ks3.mr.B, ks3.mr.C, '', ''], 'bi-record-circle text-primary', 6);
      addData(res.ks03a.cpxShoes, 'CPX SHOE', ['val1', 'val2', 'val3', 'val4', 'val5'], ['A (Width)', 'D (Height)', 'C', 'V / M', 'Type'], [ks3.cpxShoe.A, ks3.cpxShoe.D, ks3.cpxShoe.C, ks3.cpxShoe.V, ks3.cpxShoe.Type], 'bi-gear text-info', 7);
      addData(res.ks03a.loader, 'LOADER', ['val1', 'val2', 'val3', 'val4', 'val5'], ['A (Width)', 'B (OD)', 'C', 'D', 'E'], [`${ks3.ld.A_min}-${ks3.ld.A_max}`, ks3.ld.B, ks3.ld.C, ks3.ld.D, ks3.ld.E], 'bi-layers-fill text-secondary', 8);
      addData(res.ks03a.rollerShoes, 'ROLLER SHOE', ['val1', 'val2', 'val3', 'val4', 'val5'], ['A (Height)', 'C (Width)', 'D', 'B', 'Type'], [ks3.rollerShoe.A, ks3.rollerShoe.C, ks3.rollerShoe.D, ks3.rollerShoe.B, ks3.rollerShoe.Type], 'bi-gear-fill text-primary', 9);
    }

    if (res.ks500rd && res.ks500rd.calc && !res.ks500rd.calc.error) {
      const ks5 = res.ks500rd.calc;
      addData(res.ks500rd.workDrivers, 'WORK DRIVER', ['val1', 'val2'], ['A', 'B'], [ks5.wd.A, ks5.wd.B], 'bi-wrench-adjustable text-success', 1);
      addData(res.ks500rd.loadingPintles, 'LOADING PINTLE', ['val1', 'val2', 'val3', 'val4', 'val5', 'val6', 'val7', 'val8'], ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'], [ks5.lp.A, ks5.lp.B, ks5.lp.C, ks5.lp.D, ks5.lp.E, ks5.lp.F, ks5.lp.G, ks5.lp.H], 'bi-tools text-primary', 2);
      addData(res.ks500rd.frontShoes, 'FRONT SHOE', ['val1', 'val2', 'val3'], ['-', '-', '-'], ['', '', ''], 'bi-shield-shaded text-warning', 3);
    }

    if (res.ks400b5 && res.ks400b5.calc && !res.ks400b5.calc.error) {
      const b5 = res.ks400b5.calc;
      addData(res.ks400b5.workClamps, '1. WORK CLAMP', ['type', 'val1', 'val2', 'val3', 'val4', 'val5'], ['Type', 'A', 'B', 'C', 'D', 'E'], [b5.workClamp.Type, b5.workClamp.A, b5.workClamp.B, b5.workClamp.C, b5.workClamp.D, b5.workClamp.E], 'bi-nut-fill text-primary', 1);
      addData(res.ks400b5.shafts, '2. SHAFT', ['type', 'val1', 'val2', 'val3'], ['Type', 'A', 'B', 'C'], [b5.shaft.Type, b5.shaft.A, b5.shaft.B, b5.shaft.C], 'bi-gear-fill text-secondary', 2);
      addData(res.ks400b5.workChutes, '3. WORK CHUTE', ['val1', 'val2', 'val3', 'val4'], ['A', 'B', 'C', 'D'], [b5.workChute.A, b5.workChute.B, b5.workChute.C, b5.workChute.D], 'bi-box-seam-fill text-warning', 3);
      addData(res.ks400b5.workLoaders, '4. WORK LOADER', ['val1', 'val2', 'val3', 'val4', 'val5', 'val6', 'val7'], ['A', 'B', 'C', 'D', 'E', 'F', 'G'], [b5.workLoader.A, b5.workLoader.B, b5.workLoader.C, b5.workLoader.D, b5.workLoader.E, b5.workLoader.F, b5.workLoader.G], 'bi-layers-fill text-info', 4);
      addData(res.ks400b5.workChucks, '5. WORK CHUCK', ['val1'], ['A'], [b5.workChuck.A], 'bi-record-circle-fill text-success', 5);
      addData(res.ks400b5.workHolders, '6. WORK HOLDER', ['val1', 'val2'], ['A', 'B'], [b5.workHolder.A, b5.workHolder.B], 'bi-magnet-fill text-danger', 6);
      addData(res.ks400b5.chuckJaws, '7. CHUCK JAW', ['val1', 'val2', 'val3', 'val4'], ['A', 'B', 'C', 'D'], [b5.chuckJaw.A, b5.chuckJaw.B, b5.chuckJaw.C, b5.chuckJaw.D], 'bi-wrench-adjustable text-dark', 7);
      addData(res.ks400b5.workChuteGuides, '8. WORK CHUTE GUIDE', ['val1', 'val2', 'val3', 'val4', 'val5'], ['A', 'B', 'C', 'D', 'E'], [b5.workChuteGuide.A, b5.workChuteGuide.B, b5.workChuteGuide.C, b5.workChuteGuide.D, b5.workChuteGuide.E], 'bi-signpost-split-fill text-primary', 8);
      addData(res.ks400b5.stoppers, '9. STOPPER', ['val1', 'val2'], ['A', 'B'], [b5.stopper.A, b5.stopper.B], 'bi-sign-stop-fill text-danger', 9);
      addData(res.ks400b5.masterRings, '10. MASTER RING FOR JAW', ['val1', 'val2', 'val3'], ['A', 'B', 'C'], [b5.masterRingForJaw.A, b5.masterRingForJaw.B, b5.masterRingForJaw.C], 'bi-life-preserver text-success', 10);
    }

    // ==========================================
    // KS400B6 Rendering
    // ==========================================
    if (res.ks400b6 && res.ks400b6.calc && !res.ks400b6.calc.error) {
      const b6 = res.ks400b6.calc;
      addData(res.ks400b6.workDrivers, '1. WORK DRIVER', ['val1', 'val2', 'val3', 'val4', 'val5'], ['A', 'B', 'C', 'D', 'E'], [b6.workDriver.A, b6.workDriver.B, b6.workDriver.C, b6.workDriver.D, b6.workDriver.E], 'bi-wrench text-primary', 1);
      addData(res.ks400b6.loadingChutes, '2. LOADING CHUTE', ['val1', 'val2', 'val3', 'val4', 'val6'], ['A', 'B', 'C', 'D', 'F'], [b6.loadingChute.A, b6.loadingChute.B, b6.loadingChute.C, b6.loadingChute.D, b6.loadingChute.F], 'bi-box-arrow-in-down text-warning', 2);
      addData(res.ks400b6.plugs, '3. PLUG', ['val1', 'val2', 'val3', 'val4'], ['A', 'B', 'C', 'D'], [b6.plug.A, b6.plug.B, b6.plug.C, b6.plug.D], 'bi-plug-fill text-danger', 3);
      addData(res.ks400b6.workGuides, '4. WORK GUIDE', ['val1', 'val2', 'val3', 'val4', 'val5'], ['A', 'B', 'C', 'D', 'E'], [b6.workGuide.A, b6.workGuide.B, b6.workGuide.C, b6.workGuide.D, b6.workGuide.E], 'bi-compass-fill text-info', 4);
      addData(res.ks400b6.workPushers, '5. WORK PUSHER', ['val1', 'val2', 'val3'], ['A', 'B', 'C'], [b6.workPusher.A, b6.workPusher.B, b6.workPusher.C], 'bi-arrows-collapse text-secondary', 5);
      
      // Stocker Chute: เพิ่มการแสดงผล F, G, H ถ้าต้องการ (val6, val7, val8 ต้องเพิ่มใน Search_KS400B6 ด้วย)
      addData(res.ks400b6.stockerChutes, '6. STOCKER CHUTE', ['val1', 'val2', 'val3', 'val4', 'val5'], ['A', 'B', 'C', 'D', 'E'], [b6.stockerChute.A, b6.stockerChute.B, b6.stockerChute.C, b6.stockerChute.D, b6.stockerChute.E], 'bi-inboxes-fill text-dark', 6);
      
      addData(res.ks400b6.frontShoes, '7. FRONT SHOE', ['val1', 'val2', 'val3', 'val4'], ['A', 'B', 'C', 'D'], [b6.frontShoe.A, b6.frontShoe.B, b6.frontShoe.C, b6.frontShoe.D], 'bi-shield-fill text-success', 7);
      addData(res.ks400b6.rearShoes, '8. REAR SHOE', ['val1', 'val2', 'val3', 'val4'], ['A', 'B', 'C', 'D'], [b6.rearShoe.A, b6.rearShoe.B, b6.rearShoe.C, b6.rearShoe.D], 'bi-shield-check text-primary', 8);
      
      // Pilot Pin: เพิ่ม Type ให้แสดงผลด้วย
      addData(res.ks400b6.pilotPins, '9. PILOT PIN', ['val1', 'val2', 'val3', 'val4', 'val5', 'val6'], ['A', 'B', 'C', 'D', 'E', 'F'], [b6.pilotPin.A, b6.pilotPin.B, b6.pilotPin.C, b6.pilotPin.D, b6.pilotPin.E, b6.pilotPin.F], 'bi-pin-angle-fill text-danger', 9);
    }

    if (Object.keys(mData).length === 0) {
      container.innerHTML = '<div class="alert alert-secondary text-center">No matching tooling found for any machine.</div>';
      return;
    }

    // 1. ดึงค่า Process จากชิ้นงาน
    const processType = res.part && res.part.process ? String(res.part.process).trim().toUpperCase() : '';

    // 2. กำหนดกลุ่มเครื่องจักร (2. เพิ่ม KS400B6 ลงไปในกลุ่ม OD)
    const groupFace = { id: 'FACE', name: 'FACE GRIND', machines: ['TSG-300', 'TSG-300ZNC', 'TSG300W'] };
    const groupOD = { id: 'OD', name: 'OD SPH GRIND', machines: ['KS400B', 'KS400B1', 'KS400B5', 'KS400B6', 'KS-400B', 'KS-400B5', 'KS500RD'] };
    const groupID = { id: 'ID', name: 'ID GRIND', machines: ['KS-B22G', 'KS-B80', 'KS-B22RD', 'KS-03A'] };

    let orderedGroups = [];

    // 3. จัดเรียงลำดับกลุ่มตาม Process
    if (processType === 'ID→OD' || processType === 'ID->OD') {
      groupFace.title = '1. FACE GRIND';
      groupID.title = '2. ID GRIND';
      groupOD.title = '3. OD SPH GRIND';
      orderedGroups = [groupFace, groupID, groupOD];
    } else {
      groupFace.title = '1. FACE GRIND';
      groupOD.title = '2. OD SPH GRIND';
      groupID.title = '3. ID GRIND';
      orderedGroups = [groupFace, groupOD, groupID];
    }

    let html = '';
    let mIndex = 0;
    let renderedMachines = new Set(); 

    // 4. ฟังก์ชันย่อยสำหรับสร้าง HTML ของแต่ละเครื่องจักร
    const buildMachineHtml = (machineName, tools, parentId) => {
      mIndex++;
      const mCollapseId = `collapseM_${mIndex}`;
      const foundCount = Object.keys(tools).length;
      const required = REQUIRED_COUNTS[machineName] || 0;
      const isIncomplete = required > 0 && foundCount < required;

      const statusBadge = isIncomplete 
        ? `<span class="badge rounded-pill bg-warning text-dark ms-2" style="font-size: 0.7rem;"><i class="bi bi-exclamation-triangle-fill me-1"></i>Incomplete (${foundCount}/${required})</span>` 
        : '';
      const textStyle = isIncomplete ? 'color: #d9480f !important; font-weight: 700;' : '';

      let mHtml = `
        <div class="accordion-item mb-3 border-0 rounded overflow-hidden shadow-sm">
          <h2 class="accordion-header">
            <button class="accordion-button collapsed fs-5 bg-white" type="button" data-bs-toggle="collapse" data-bs-target="#${mCollapseId}">
              <i class="bi bi-hdd-rack-fill machine-icon me-2"></i> 
              <span style="${textStyle}">${esc(machineName)}</span>
              ${statusBadge}
            </button>
          </h2>
          <div id="${mCollapseId}" class="accordion-collapse collapse" data-bs-parent="#${parentId}">
            <div class="accordion-body bg-light p-3">
      `;

      const sortedTools = Object.entries(tools).sort((a, b) => a[1].order - b[1].order);

      for (const [toolName, toolData] of sortedTools) {
        let ths = `<th style="width:50px;">#</th><th class="text-start">No</th>` + toolData.headers.map((h, i) => {
          let targetHtml = '';
          const targetVal = toolData.targets[i];
          if(targetVal !== undefined && targetVal !== null && targetVal !== '' && targetVal !== '-') {
            targetHtml = `<br><span class="req-badge">Req: ${targetVal}</span>`;
          }
          return `<th>${h}${targetHtml}</th>`;
        }).join('');

        let trs = toolData.rows.map((row, idx) => {
          const rank = idx + 1;
          const rankClass = rank <= 3 ? 'rank-' + rank : '';
          const badge = rankClass ? `<span class="rank-badge ${rankClass}">${rank}</span>` : rank;
          let tds = toolData.cols.map(c => `<td>${esc(row[c])}</td>`).join('');
          return `<tr><td>${badge}</td><td class="col-no">${esc(row.no)}</td>${tds}</tr>`;
        }).join('');

        mHtml += `
          <div class="card mb-4 border-0 shadow-sm rounded">
            <div class="card-header bg-white py-2 d-flex align-items-center">
              <i class="bi ${toolData.icon} me-2"></i>
              <span class="fw-bold">${toolName}</span>
              <span class="badge bg-secondary ms-auto rounded-pill">${toolData.rows.length} Items</span>
            </div>
            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead><tr>${ths}</tr></thead>
                <tbody>${trs}</tbody>
              </table>
            </div>
          </div>
        `;
      }
      mHtml += `</div></div></div>`;
      return mHtml;
    };

    // 5. วนลูปสร้าง HTML ตามกลุ่มที่จัดเรียงไว้
    orderedGroups.forEach(group => {
      let groupHasData = false;
      const parentId = `accordion_${group.id}`;
      
      let groupHtml = `
        <div class="mt-4 mb-3">
          <h4 class="fw-bold text-primary border-bottom border-primary pb-2" style="border-width: 3px !important; color: #0d6efd;">
            <i class="bi bi-diagram-3-fill me-2"></i>${group.title}
          </h4>
        </div>
        <div class="accordion shadow-sm mb-4" id="${parentId}">
      `;

      group.machines.forEach(machineName => {
        if (mData[machineName]) {
          groupHasData = true;
          renderedMachines.add(machineName); // บันทึกว่าเครื่องนี้ถูกสร้างแล้ว
          groupHtml += buildMachineHtml(machineName, mData[machineName], parentId);
        }
      });
      groupHtml += `</div>`;

      // แสดงกลุ่มนี้เฉพาะกรณีที่มีเครื่องจักรอย่างน้อย 1 เครื่อง
      if (groupHasData) {
        html += groupHtml;
      }
    });

    // 6. เผื่อกรณีมีเครื่องจักรตกหล่น
    let otherMachinesHtml = '';
    let hasOtherMachines = false;
    for (const [machineName, tools] of Object.entries(mData).sort()) {
      if (!renderedMachines.has(machineName)) {
        if (!hasOtherMachines) {
          hasOtherMachines = true;
          otherMachinesHtml += `
            <div class="mt-4 mb-3">
              <h4 class="fw-bold text-secondary border-bottom border-secondary pb-2" style="border-width: 3px !important;">
                <i class="bi bi-three-dots me-2"></i>OTHER MACHINES
              </h4>
            </div>
            <div class="accordion shadow-sm mb-4" id="accordion_OTHER">
          `;
        }
        otherMachinesHtml += buildMachineHtml(machineName, tools, 'accordion_OTHER');
      }
    }
    if (hasOtherMachines) {
      otherMachinesHtml += `</div>`;
      html += otherMachinesHtml;
    }

    container.innerHTML = html;
  }

  function displayResults(res) {
    setLoading(false);
    if(!res.success) { alert("Error: " + res.error); return; }

    document.getElementById('resultArea').style.display = 'block';

    if(res.part) {
      document.getElementById('partOdBf').textContent = res.part.odBf != null ? res.part.odBf : '-';
      document.getElementById('partOdAft').textContent = res.part.odAft != null ? res.part.odAft : '-';
      document.getElementById('partIdBf').textContent = res.part.idBf != null ? res.part.idBf : '-';
      document.getElementById('partIdAft').textContent = res.part.idAft != null ? res.part.idAft : '-';
      document.getElementById('partWBf').textContent = res.part.wBf != null ? res.part.wBf : '-';
      document.getElementById('partWAft').textContent = res.part.wAft != null ? res.part.wAft : '-';
      
      document.getElementById('partType').textContent = res.part.type || '-';
      document.getElementById('partProcess').textContent = res.part.process || '-';
      document.getElementById('partYball').textContent = res.part.yBall || '-';
    }

    const sdContainer = document.getElementById('sdContainer');
    if (res.ks400b && res.ks400b.calc && !res.ks400b.calc.error && res.ks400b.calc.SD) {
      document.getElementById('partSD').textContent = res.ks400b.calc.SD;
      sdContainer.style.display = 'block';
    } else {
      sdContainer.style.display = 'none';
    }

    renderMachineAccordions(res);
  }

  function handleError(error) {
    setLoading(false);
    alert("System Error: " + error.message);
  }

  document.getElementById("cnInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") performSearch();
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
