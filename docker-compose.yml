services:
  backend:
    build:
      context: ./apps/ENG-Backend
      dockerfile: Dockerfile
      args:
        - HTTP_PROXY=http://lble131:Eng1123456789@proxyth.bp.minebea.local:8080
        - HTTPS_PROXY=http://lble131:Eng1123456789@proxyth.bp.minebea.local:8080
    container_name: eng_backend
    restart: unless-stopped
    ports:
      - "2005:2005"
    env_file:
      - ./apps/ENG-Backend/.env
    environment:
      - NODE_ENV=production
    volumes:
      - backend_uploads:/app/files/uploads

  frontend:
    build:
      context: .
      dockerfile: apps/ENG-Frontend/Dockerfile
      args:
        - HTTP_PROXY=http://lble131:Eng1123456789@proxyth.bp.minebea.local:8080
        - HTTPS_PROXY=http://lble131:Eng1123456789@proxyth.bp.minebea.local:8080
    container_name: eng_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend_uploads: # Volume for persistent backend file uploads (pdf, images, etc.)
